worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Hide nginx version from error pages and Server header
    server_tokens off;

    # Only allow the app service to be the upstream — no direct public access
    upstream flask_app {
        server app:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Enforce a max request body size (prevent large payload DoS)
        client_max_body_size 1m;

        # Security headers added at the proxy layer
        add_header X-Frame-Options        "DENY"            always;
        add_header X-Content-Type-Options "nosniff"         always;
        add_header Referrer-Policy        "no-referrer"     always;

        location / {
            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Prevent response buffering issues
            proxy_buffering    off;
            proxy_read_timeout 30s;
        }

        # Block direct access to the database file if accidentally exposed
        location ~ \.db$ {
            deny all;
        }
    }
}
